# This workflow will install Python dependencies, run tests and lint with a
# variety of Python versions. For more information see:
# https://help.github.com/actions/language-and-framework-guides/
# using-python-with-github-actions

name: pytest with flake8

on: [push, pull_request]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest", "windows-latest"]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        numpy-ver: ["latest"]
        test_config: ["latest"]
        include:
          # Support different GA Mac environmnets, have at least one Intel
          - python-version: "3.10"
            os: "macos-26-intel"
          - python-version: "3.11"
            os: "macos-latest"
          - python-version: "3.12"
            os: "macos-latest"
          - python-version: "3.13"
            os: "macos-latest"
          - python-version: "3.14"
            os: "macos-latest"
          # NEP29 compliance settings
          - python-version: "3.11"
            numpy-ver: "2.0"
            os: "ubuntu-latest"
            test_config: "NEP29"

    name: Python ${{ matrix.python-version }} on ${{ matrix.os }} with Numpy ${{ matrix.numpy-ver }}
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        architecture: 'x64'

    - name: Install NEP29 dependencies
      if: ${{ matrix.test_config == 'NEP29'}}
      run: |
        pip install numpy==${{ matrix.numpy-ver }}

    - name: Install standard and test dependencies
      run: pip install --upgrade-strategy only-if-needed .[test]

    - name: Install on Linux/Windows
      if: ${{ matrix.os == 'ubuntu-latest' || matrix.os == 'windows-latest'}}
      run: |
          python -m build .
          pip install -e .

    - name: Install on MacOS
      if: ${{ matrix.os == 'macos-latest' || matrix.os == 'macos-26-intel'}}
      run: |
          brew reinstall gcc
          python -m build .
          pip install -e .

    - name: Test PEP8 compliance
      run: flake8 . --count --select=D,E,F,H,W --show-source --statistics

    - name: Evaluate complexity
      run: flake8 . --count --exit-zero --max-complexity=10 --statistics

    - name: Run unit and integration tests
      run: pytest --cov --cov-report xml aacgmv2/tests/

    - name: Coveralls Parallel
      uses: coverallsapp/github-action@v2
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        flag-name: run=${{ join(matrix.*, '-') }}
        parallel: true
        format: cobertura
        debug: true

  finish:
    name: Finish Coverage Analysis
    needs: build
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
    - name: Coveralls Finished
      uses: coverallsapp/github-action@v2
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        parallel-finished: true

